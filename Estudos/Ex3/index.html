<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardando as Esperas do Dragão!</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>
    <form>
        <div class="container-imagem">
            <img src="/Estudos/Ex3/img/260199.png" alt="Radar do Dragão" class="radar-do-dragao">
            <div class="informacoes-dentro-imagem">
                <h1>Guarde Suas Esferas do Dragão!🐉</h1>
                <h2>Qual esfera do Dragão Você Encontrou?</h2>
                <input type="number" min="1" max="7" id="entr-esferas" placeholder="nº?">
                <button id="guardar" name="guardar" type="button">Guardar</button>
            </div>
            
                <ul id="lista-de-esferas">
                    <li>
                        <img src="/Estudos/Ex3/img/esfera-1n.png" alt="esfera-do-dragao-1">
                    </li> 
                </ul>
        </div>
    </form>
</body>
</html>
